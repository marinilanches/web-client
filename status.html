<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Status do Pedido</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

<header class="topbar">
  <h2>📦 Status do Pedido</h2>
</header>

<section class="menu">
  <h3>Seu Pedido</h3>

  <div id="pedidoInfo">
    Carregando...
  </div>
</section>

<script type="module">
  import { ouvirPedidoPorId } from "./js/services/orders.js";

  const pedidoInfo = document.getElementById("pedidoInfo");

  function formatarMoeda(valor) {
    return Number(valor || 0).toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });
  }

  function getClasseStatus(status) {
  switch (status) {
    case "RECEBIDO":
      return "status-recebido";
    case "PREPARANDO":
      return "status-preparando";
    case "PRONTO":
      return "status-pronto";
    case "ENTREGUE":
      return "status-entregue";
    case "CANCELADO":
      return "status-cancelado";
    default:
      return "status-cancelado";
  }
}

  function renderMensagem(texto) {
    pedidoInfo.innerHTML = `
      <div class="empty-state">
        <p>${texto}</p>
      </div>
    `;
  }

  function renderPedido(pedido) {
    const status = pedido.status || "—";
    const classeStatus = getClasseStatus(status);

    pedidoInfo.innerHTML = `
      <div class="status-card">
        <h3>Pedido #${pedido.numeroPedido || pedido.id}</h3>

        <div class="status-linha">
          <span class="status-label">Status</span>
          <span class="status-badge ${classeStatus}">${status}</span>
        </div>

        <div class="status-linha">
          <span class="status-label">Total</span>
          <span class="status-valor">${formatarMoeda(pedido.valorTotal)}</span>
        </div>

        <div class="status-linha">
          <span class="status-label">Pagamento</span>
          <span class="status-valor">${pedido.pagamentoStatus || "—"}</span>
        </div>

        <div class="status-linha">
          <span class="status-label">Tipo</span>
          <span class="status-valor">${pedido.tipo || "—"}</span>
        </div>

        ${
          pedido.tipo === "Delivery"
            ? `
              <div class="status-linha">
                <span class="status-label">Endereço</span>
                <span class="status-valor">${pedido.endereco || "—"}</span>
              </div>

              <div class="status-linha">
                <span class="status-label">Referência</span>
                <span class="status-valor">${pedido.referencia || "—"}</span>
              </div>
            `
            : ""
        }

        <div class="status-linha">
          <span class="status-label">Observações</span>
          <span class="status-valor">${pedido.observacoes || "—"}</span>
        </div>
      </div>
    `;
  }

  // =======================
  // LER ID DA URL
  // =======================
  const params = new URLSearchParams(window.location.search);
  const pedidoId = params.get("id");

  // se não tiver ?id=...
  if (!pedidoId) {
    renderMensagem("Nenhum pedido foi informado. Volte e finalize um pedido para acompanhar o status.");
  } else {
    // ouvir SOMENTE esse pedido em tempo real
    ouvirPedidoPorId(
      pedidoId,
      (pedido) => {
        renderPedido(pedido);
      },
      () => {
        renderMensagem("Pedido não encontrado.");
      }
    );
  }
</script>

</body>
</html>
