<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status do Pedido</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

<header class="topbar">
  <h2>📦 Status do Pedido</h2>
</header>

<section class="menu">
  <h3>Seu Pedido</h3>
  <div id="pedidoInfo">Carregando...</div>
</section>

<script type="module">
  import { ouvirPedidoPorId } from "./js/services/orders.js";

  const pedidoInfo = document.getElementById("pedidoInfo");

  function formatarMoeda(valor) {
    return Number(valor || 0).toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });
  }

  function formatarData(data) {
    if (!data) return "—";

    // Firestore Timestamp
    if (typeof data.toDate === "function") {
      return data.toDate().toLocaleString("pt-BR");
    }

    // string / Date comum
    try {
      return new Date(data).toLocaleString("pt-BR");
    } catch {
      return "—";
    }
  }

  function renderMensagem(texto) {
    pedidoInfo.innerHTML = `
      <div class="item status-card" style="display:block;">
        <p>${texto}</p>
      </div>
    `;
  }

  function getStatusLabel(status) {
    switch (status) {
      case "RECEBIDO":
        return "🟡 Recebido";
      case "PREPARANDO":
        return "👨‍🍳 Em preparo";
      case "PRONTO":
        return "✅ Pronto";
      case "ENTREGUE":
        return "🚚 Entregue";
      case "CANCELADO":
        return "❌ Cancelado";
      default:
        return status || "—";
    }
  }

  function renderPedido(pedido, pedidoId) {
    const itens = Array.isArray(pedido.itens) ? pedido.itens : [];

    const itensHtml = itens.length
      ? itens.map(item => {
          const quantidade = Number(item.quantidade || 1);
          const valorUnitario = Number(item.valorUnitario || item.preco || 0);
          const subtotal = Number(item.subtotal || quantidade * valorUnitario);

          return `
            <div class="status-item-linha">
              <strong>${quantidade}x ${item.nome || "Item"}</strong>
              <div>Unitário: ${formatarMoeda(valorUnitario)}</div>
              <div>Subtotal: ${formatarMoeda(subtotal)}</div>
            </div>
          `;
        }).join("")
      : "<p>Nenhum item.</p>";

    const isDelivery = pedido.tipo === "Delivery";

    const blocoEntrega = isDelivery
      ? `
        <div class="status-section">
          <h4>Entrega</h4>
          <p><strong>Bairro:</strong> ${pedido.bairro || "—"}</p>
          <p><strong>Endereço:</strong> ${pedido.endereco || "—"}</p>
          <p><strong>Referência:</strong> ${pedido.referencia || "—"}</p>
        </div>
      `
      : "";

    pedidoInfo.innerHTML = `
      <div class="item status-card" style="display:block;">
        <h3>Pedido #${pedido.numeroPedido || pedidoId}</h3>

        <p><strong>Status:</strong> ${getStatusLabel(pedido.status)}</p>
        <p><strong>Data:</strong> ${formatarData(pedido.criadoEm || pedido.createdAt)}</p>

        <div class="status-section">
          <h4>Cliente</h4>
          <p><strong>Nome:</strong> ${pedido.cliente || "—"}</p>
          <p><strong>Telefone:</strong> ${pedido.telefone || pedido.telefoneWhatsapp || "—"}</p>
          <p><strong>Tipo:</strong> ${pedido.tipo || "—"}</p>
        </div>

        <div class="status-section">
          <h4>Pagamento</h4>
          <p><strong>Método:</strong> ${pedido.pagamentoMetodo || "—"}</p>
          <p><strong>Status do pagamento:</strong> ${pedido.pagamentoStatus || "—"}</p>
        </div>

        ${blocoEntrega}

        <div class="status-section">
          <h4>Observações</h4>
          <p>${pedido.observacoes || "—"}</p>
        </div>

        <div class="status-section">
          <h4>Itens</h4>
          ${itensHtml}
        </div>

        <div class="status-section">
          <h4>Resumo</h4>
          <p><strong>Subtotal:</strong> ${formatarMoeda(pedido.valorSubtotal)}</p>
          <p><strong>Taxa de entrega:</strong> ${formatarMoeda(pedido.taxaEntrega)}</p>
          <p><strong>Total:</strong> ${formatarMoeda(pedido.valorTotal)}</p>
        </div>
      </div>
    `;
  }

  const params = new URLSearchParams(window.location.search);
  const pedidoId = params.get("id");

  if (!pedidoId) {
    renderMensagem("Nenhum pedido foi informado. Volte e finalize um pedido para acompanhar o status.");
  } else {
    ouvirPedidoPorId(
      pedidoId,
      (pedido) => {
        renderPedido(pedido, pedidoId);
      },
      () => {
        renderMensagem("Pedido não encontrado.");
      }
    );
  }
</script>

</body>
</html>
