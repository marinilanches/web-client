<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./css/login.css">
  <title>Login Admin</title>
</head>

<body>

<div class="login-card">
  <div class="login-logo">🍔</div>
  <h2 class="login-title">Mesa Fácil</h2>
  <p class="login-subtitle">Acesso ao painel administrativo</p>

  <div class="login-form">
    <div>
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="seuemail@exemplo.com" />
    </div>

    <div>
      <label for="password">Senha</label>
      <input id="password" type="password" placeholder="Digite sua senha" />
    </div>

    <button class="login-btn" onclick="login()">Entrar</button>
  </div>
</div>

<script type="module">
import { login } from "./js/services/auth.js";

window.login = async () => {
  const loginValue = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    await login(loginValue, password);
    alert("Login OK");
    window.location.href = "./admin/index.html";
  } catch (e) {
    alert("Login ou senha inválidos.");
  }
};
</script>

</body>
</html>
