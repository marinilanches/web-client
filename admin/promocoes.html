<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Promoções • Mesa Fácil</title>

    <link rel="icon" type="image/png" href="../assets/admin-icon.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <div class="layout">
      <aside id="sidebar"></aside>

      <main class="content">
        <header id="header"></header>

        <section class="dashboard">
          <h1>Promoções</h1>

          <p class="subtitle">
            Cadastre ofertas especiais que aparecerão para os clientes.
          </p>

          <div class="toolbar promocoes-toolbar">
            <button id="novaPromocao">🔥 Nova promoção</button>
          </div>

          <div id="listaPromocoes"></div>
        </section>
      </main>
    </div>

    <!-- ==========================================================
         MODAL BOOTSTRAP
         FORA DO LAYOUT PARA EVITAR CONFLITOS
    =========================================================== -->

    <div
      class="modal fade"
      id="modalPromocao"
      tabindex="-1"
      aria-labelledby="modalPromocaoLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalPromocaoLabel">🔥 Promoção</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Fechar"
            ></button>
          </div>

          <div class="modal-body">
            <input type="hidden" id="promocaoId" />

            <label class="form-label"> Produto </label>

            <select id="produtoPromocao" class="form-select mb-3">
              <option value="">Selecione um produto</option>
            </select>

            <div id="produtoPreview" class="mb-3"></div>

            <label class="form-label"> Preço promocional </label>

            <input
              id="precoPromocional"
              type="number"
              step="0.01"
              class="form-control mb-3"
              placeholder="10.00"
            />

            <hr class="my-4" />

            <h6 class="fw-bold mb-3">Regras da promoção</h6>

            <small class="text-muted d-block mb-3">
              Se nenhuma opção for marcada em um grupo, a promoção será válida
              para todos.
            </small>

            <label class="form-label"> Dia da semana </label>

            <select id="diaSemanaPromocao" class="form-select mb-3">
              <option value="">Qualquer dia</option>
              <option value="segunda">Segunda</option>
              <option value="terca">Terça</option>
              <option value="quarta">Quarta</option>
              <option value="quinta">Quinta</option>
            </select>

            <label class="form-label"> Mês </label>

            <input
              id="mesPromocao"
              type="text"
              class="form-control mb-3"
              readonly
            />

            <label class="form-label"> Forma de pagamento </label>

            <select id="pagamentoPromocao" class="form-select mb-3">
              <option value="">Qualquer pagamento</option>
              <option value="pix">Pix</option>
              <option value="dinheiro">Dinheiro</option>
            </select>

            <div class="form-check">
              <input
                id="ativoPromocao"
                class="form-check-input"
                type="checkbox"
                checked
              />

              <label class="form-check-label" for="ativoPromocao">
                Promoção ativa
              </label>
            </div>
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>

            <button id="salvarPromocao" type="button" class="btn btn-danger">
              Salvar promoção
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
