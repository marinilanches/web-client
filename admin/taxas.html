<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Taxas de Entrega • Mesa Fácil</title>

  <link rel="stylesheet" href="css/admin.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside id="sidebar"></aside>

    <!-- Conteúdo -->
    <main class="content">

      <!-- Header -->
      <header id="header"></header>

      <section class="dashboard taxas-page">

        <h1>Taxas de Entrega</h1>
        <p class="subtitle">
          Cadastre os bairros e a taxa de entrega usada no checkout do cliente.
        </p>

        <!-- Formulário -->
        <section class="panel taxas-card">
          <div class="panel-title">
            🚚 <span id="formTitulo">Cadastrar bairro</span>
          </div>

          <form id="taxaForm">
            <div class="taxas-grid">
              <div class="taxas-campo">
                <label for="nome">Nome do bairro</label>
                <input
                  type="text"
                  id="nome"
                  placeholder="Ex.: Centro"
                  required
                />
              </div>

              <div class="taxas-campo">
                <label for="taxa">Taxa de entrega (R$)</label>
                <input
                  type="number"
                  id="taxa"
                  min="0"
                  step="0.01"
                  placeholder="Ex.: 5.00"
                  required
                />
              </div>

              <div class="taxas-campo">
                <label for="ordem">Ordem</label>
                <input
                  type="number"
                  id="ordem"
                  min="0"
                  step="1"
                  placeholder="Ex.: 1"
                />
              </div>

              <div class="taxas-campo">
                <label for="ativo">Status</label>
                <select id="ativo">
                  <option value="true">Ativo</option>
                  <option value="false">Inativo</option>
                </select>
              </div>
            </div>

            <div class="taxas-acoes-form">
              <button type="submit" class="btn" id="btnSalvar">
                Salvar bairro
              </button>

              <button
                type="button"
                class="btn btn-secondary"
                id="btnCancelarEdicao"
                style="display: none;"
              >
                Cancelar edição
              </button>
            </div>
          </form>
        </section>

        <!-- Lista -->
        <section class="panel taxas-card">
          <div class="panel-title">📍 Bairros cadastrados</div>

          <div class="taxas-table-wrap">
            <table class="taxas-table">
              <thead>
                <tr>
                  <th>Bairro</th>
                  <th>Taxa</th>
                  <th>Ordem</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="listaTaxas">
                <tr>
                  <td colspan="5" class="taxas-empty">Carregando bairros...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

      </section>

    </main>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
