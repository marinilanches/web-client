<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Integrações • Mesa Fácil</title>

    <link rel="icon" type="image/png" href="../assets/admin-icon.png" />

    <link rel="stylesheet" href="css/admin.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="layout">
      <!-- Sidebar -->

      <aside id="sidebar"></aside>

      <!-- Conteúdo -->

      <main class="content">
        <!-- Header -->

        <header id="header"></header>

        <section class="dashboard">
          <div class="page-header">
            <h1>🔗 Integrações</h1>

            <p class="subtitle">
              Configure serviços externos conectados ao Mesa Fácil.
            </p>
          </div>

          <!-- CONFIGURAÇÃO BEE -->

          <section class="panel">
            <div class="panel-title">🚚 Bee Delivery</div>

            <div class="form-grid">
              <div class="form-group">
                <label> Ativar integração </label>

                <label class="switch">
                  <input type="checkbox" id="beeAtivo" />

                  <span class="slider"></span>
                </label>
              </div>

              <div class="form-group">
                <label> Ambiente </label>

                <select id="beeAmbiente">
                  <option value="teste">Teste</option>

                  <option value="producao">Produção</option>
                </select>
              </div>

              <div class="form-group">
                <label> Token API </label>

                <div class="token-wrapper">
                  <input
                    type="password"
                    id="beeToken"
                    value="••••••••••••"
                    readonly
                  />

                  <button
                    type="button"
                    class="btn btn-secondary"
                    id="alterarToken"
                  >
                    🔑 Alterar token
                  </button>
                </div>
              </div>
            </div>

            <button class="btn btn-primary" id="salvarIntegracoes">
              💾 Salvar configuração
            </button>
          </section>

          <!-- STATUS INTEGRAÇÃO -->

          <section class="panel">
            <div class="panel-title">🔌 Status da integração</div>

            <div id="statusIntegracao" class="status-box">Carregando...</div>
          </section>

          <!-- STATUS ENTREGADOR -->

          <section class="panel">
            <div class="panel-title">📦 Status do entregador</div>

            <div id="statusEntregador" class="status-box">
              Nenhum entregador solicitado
            </div>

            <button class="btn btn-secondary" id="solicitarEntrega">
              🚚 Solicitar entregador manualmente
            </button>
            <button class="btn btn-primary" id="atualizarStatus">
              🔄 Atualizar status
            </button>
          </section>
        </section>
      </main>
    </div>

    <!-- Componentes -->

    <script type="module" src="js/app.js"></script>
  </body>
</html>
