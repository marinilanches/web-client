<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PDV • Mesa Fácil</title>

    <link rel="stylesheet" href="css/admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <aside id="sidebar"></aside>

    <!-- Conteúdo -->

    <main class="content">

        <header id="header"></header>

        <section class="dashboard">

            <div class="pdv-header">

                <div>

                    <h1>Frente de Caixa (PDV)</h1>

                    <p class="subtitle">
                        Venda rápida para balcão, delivery, retirada e mesas.
                    </p>

                </div>

                <button
                    class="btn btn-danger"
                    id="btnCancelarVenda">

                    🗑 Cancelar Venda

                </button>

            </div>

            <div class="pdv-layout">

                <!-- ESQUERDA -->

                <section class="pdv-produtos">

                    <div class="panel">

                        <div class="toolbar">

                            <input
                                id="buscarProdutoPDV"
                                type="text"
                                placeholder="Pesquisar produto..."
                            >

                            <select id="categoriaPDV">

                                <option value="">Todas categorias</option>

                            </select>

                        </div>

                    </div>

                    <div
                        id="listaProdutosPDV"
                        class="pdv-grid">

                    </div>

                </section>

                <!-- DIREITA -->

                <aside class="pdv-carrinho">

                    <div class="panel">

                        <h2>Carrinho</h2>

                        <div id="itensCarrinho">

                            <div class="empty-state">

                                <p>

                                    Nenhum produto adicionado.

                                </p>

                            </div>

                        </div>

                    </div>

                    <div class="panel">

                        <div class="form-group">

                            <label>Cliente</label>

                            <select id="clientePDV">

                                <option value="">
                                    Consumidor Final
                                </option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Tipo</label>

                            <select id="tipoPedidoPDV">

                                <option value="Retirada">

                                    Retirada

                                </option>

                                <option value="Delivery">

                                    Delivery

                                </option>

                                <option value="Mesa">

                                    Mesa

                                </option>

                            </select>

                        </div>

                        <div
                            class="form-group"
                            id="containerMesa"
                            style="display:none">

                            <label>Mesa</label>

                            <select id="mesaPDV">

                            </select>

                        </div>

                        <div
                            class="form-group"
                            id="containerTaxa"
                            style="display:none">

                            <label>Bairro</label>

                            <select id="bairroPDV">

                            </select>

                        </div>

                    </div>

                    <div class="panel">

                        <div class="pdv-total">

                            <span>Subtotal</span>

                            <strong id="subtotalPDV">

                                R$ 0,00

                            </strong>

                        </div>

                        <div class="pdv-total">

                            <span>Taxa</span>

                            <strong id="taxaPDV">

                                R$ 0,00

                            </strong>

                        </div>

                        <div class="pdv-total">

                            <span>Desconto</span>

                            <strong id="descontoPDV">

                                R$ 0,00

                            </strong>

                        </div>

                        <hr>

                        <div class="pdv-total total-geral">

                            <span>Total</span>

                            <strong id="totalPDV">

                                R$ 0,00

                            </strong>

                        </div>

                    </div>

                    <div class="panel">

                        <div class="form-group">

                            <label>Forma de pagamento</label>

                            <select id="pagamentoPDV">

                                <option value="DINHEIRO">

                                    Dinheiro

                                </option>

                                <option value="PIX">

                                    Pix

                                </option>

                                <option value="CREDITO">

                                    Cartão de Crédito

                                </option>

                                <option value="DEBITO">

                                    Cartão de Débito

                                </option>

                            </select>

                        </div>

                        <div
                            class="form-group"
                            id="trocoContainer">

                            <label>Cliente paga</label>

                            <input
                                type="number"
                                id="trocoPara"
                                min="0"
                                step="0.01"
                            >

                        </div>

                        <button
                            id="btnFinalizarVenda"
                            class="btn btn-primary btn-full">

                            💳 Finalizar Venda

                        </button>

                    </div>

                </aside>

            </div>

        </section>

    </main>

</div>

<script type="module" src="js/app.js"></script>
<script type="module" src="js/pdv.js"></script>

</body>

</html>
