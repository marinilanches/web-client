<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Pedido</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/pedido-status.css" />
    <style>
      /* ==========================================================
   CHECKOUT MODERNO - RESPONSIVO
========================================================== */

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        overflow-x: hidden;
      }

      /* ==========================================================
   CONTAINER
========================================================== */

      .checkout-container {
        width: 100%;
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px calc(120px + env(safe-area-inset-bottom));
      }

      .checkout-form {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      /* ==========================================================
   ELEMENTOS OCULTOS
========================================================== */

      .hidden {
        display: none !important;
      }

      /* ==========================================================
   CARDS
========================================================== */

      .bloco {
        width: 100%;
        background: #fff;
        border: 1px solid var(--mf-border);
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
        overflow: hidden;
      }

      .bloco h2,
      .bloco h3 {
        margin: 0 0 22px;
        color: var(--mf-text);
        font-size: 1.25rem;
        font-weight: 800;
      }

      /* ==========================================================
   CAMPOS
========================================================== */

      .campo {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 18px;
      }

      .campo:last-child {
        margin-bottom: 0;
      }

      .campo label {
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--mf-text);
      }

      .checkout-form input,
      .checkout-form select,
      .checkout-form textarea {
        width: 100%;
        max-width: 100%;

        display: block;

        min-height: 54px;

        padding: 14px 16px;

        border-radius: 16px;

        border: 1px solid #ddd;

        background: #fff;

        color: #222;

        font-size: 16px;

        outline: none;

        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .checkout-form textarea {
        min-height: 130px;
        resize: vertical;
        line-height: 1.5;
      }

      .checkout-form input:focus,
      .checkout-form select:focus,
      .checkout-form textarea:focus {
        border-color: var(--mf-primary);

        box-shadow: 0 0 0 4px rgba(234, 29, 44, 0.12);
      }

      /* ==========================================================
   ENDEREÇO
========================================================== */

      .endereco-grid {
        width: 100%;

        display: grid;

        grid-template-columns: 1fr;

        gap: 0;
      }

      .endereco-grid .full {
        width: 100%;
      }

      #rua,
      #numero {
        margin-bottom: 12px;
      }

      /* botão localização */

      .btn-localizacao {
        width: 100%;

        min-height: 54px;

        margin-top: 8px;

        border: none;

        border-radius: 16px;

        background: #eef5ff;

        color: #2463d8;

        font-size: 16px;

        font-weight: 700;

        cursor: pointer;
      }

      .btn-localizacao:active {
        transform: scale(0.98);
      }

      #statusLocalizacao {
        display: block;

        width: 100%;

        margin-top: 12px;

        text-align: center;

        font-size: 14px;

        line-height: 1.4;

        color: #555;
      }

      /* ==========================================================
   RESUMO DO CARRINHO
========================================================== */

      .resumo-card {
        overflow: hidden;
      }

      #resumo {
        width: 100%;
      }

      .item-resumo {
        width: 100%;

        padding: 18px 0;

        border-bottom: 1px solid #eee;
      }

      .item-resumo:last-child {
        border-bottom: none;
      }

      .item-cabecalho {
        display: flex;

        flex-direction: column;

        gap: 12px;
      }

      .item-cabecalho h4 {
        margin: 0;

        font-size: 18px;

        font-weight: 800;

        color: #222;
      }

      .item-info {
        display: flex;

        justify-content: space-between;

        align-items: center;

        gap: 10px;

        flex-wrap: wrap;

        color: #555;

        font-size: 15px;
      }

      /* adicionais */

      .item-adicionais {
        margin-top: 14px;

        padding: 14px;

        border-radius: 14px;

        background: #f7f7f7;
      }

      .item-adicionais strong {
        font-size: 14px;
      }

      .item-adicionais ul {
        margin: 10px 0 0 18px;

        padding: 0;
      }

      .item-adicionais li {
        margin-bottom: 6px;

        line-height: 1.4;
      }

      /* subtotal item */

      .item-subtotal {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin-top: 15px;

        padding-top: 14px;

        border-top: 1px dashed #ddd;

        font-weight: 700;
      }

      .item-subtotal strong {
        font-size: 17px;
      }

      /* ==========================================================
   TOTAL
========================================================== */

      .resumo-box {
        margin-top: 18px;

        padding: 18px;

        background: #fafafa;

        border-radius: 16px;
      }

      .resumo-box p {
        display: flex;

        justify-content: space-between;

        align-items: center;

        gap: 10px;

        margin: 12px 0;
      }

      .linha-total {
        padding-top: 18px;

        margin-top: 18px !important;

        border-top: 2px dashed #ddd;

        font-size: 18px;

        font-weight: 800;
      }

      .linha-total strong {
        color: var(--mf-primary);

        font-size: 1.5rem;
      }

      /* ==========================================================
   BOTÃO FINAL
========================================================== */

      .btn-finalizar {
        width: 100%;

        min-height: 60px;

        border: none;

        border-radius: 18px;

        background: linear-gradient(135deg, #ff3344, var(--mf-primary));

        color: #fff;

        font-size: 18px;

        font-weight: 800;

        cursor: pointer;

        box-shadow: 0 12px 30px rgba(234, 29, 44, 0.25);
      }

      .btn-finalizar:disabled {
        opacity: 0.5;
      }

      /* ==========================================================
   MOBILE
========================================================== */

      @media (max-width: 768px) {
        .checkout-container {
          margin: 12px auto;

          padding-left: 12px;

          padding-right: 12px;

          padding-bottom: calc(110px + env(safe-area-inset-bottom));
        }

        .bloco {
          padding: 18px;

          border-radius: 18px;
        }

        .bloco h3 {
          font-size: 1.15rem;
        }

        /*
     botão fixo sem cobrir conteúdo
  */

        #btnFinalizar {
          position: fixed;

          left: 12px;

          right: 12px;

          bottom: calc(12px + env(safe-area-inset-bottom));

          width: calc(100% - 24px);

          z-index: 999;
        }
      }

      /* ==========================================================
   CELULARES PEQUENOS
========================================================== */

      @media (max-width: 480px) {
        .checkout-container {
          padding-left: 10px;

          padding-right: 10px;
        }

        .bloco {
          padding: 16px;

          border-radius: 16px;
        }

        .checkout-form input,
        .checkout-form select,
        .checkout-form textarea {
          border-radius: 14px;
        }

        .item-info {
          flex-direction: column;

          align-items: flex-start;
        }

        #btnFinalizar {
          left: 10px;

          width: calc(100% - 20px);
        }
      }

      /* ==========================================================
   CHECKBOX RUA SEM NÚMERO
========================================================== */

      .checkbox-rua-sem-numero {
        display: flex;

        flex-direction: row;

        align-items: center;

        justify-content: flex-start;

        gap: 12px;

        margin: 8px 0 18px;

        padding: 14px 16px;

        background: #f7f7f7;

        border-radius: 14px;

        border: 1px solid #eee;
      }

      .checkbox-rua-sem-numero input {
        width: 22px;

        height: 22px;

        min-height: unset;

        margin: 0;

        cursor: pointer;

        accent-color: var(--mf-primary);
      }

      .checkbox-rua-sem-numero label {
        margin: 0;

        font-size: 15px;

        font-weight: 700;

        color: var(--mf-text);

        cursor: pointer;
      }

      /* ==========================================================
   TABLET / DESKTOP
========================================================== */

      @media (min-width: 769px) {
        .endereco-grid {
          grid-template-columns: 1fr 1fr;

          gap: 16px;
        }

        .endereco-grid .full {
          grid-column: 1/-1;
        }
      }

      .autocomplete-wrapper {
        position: relative;
        z-index: 1000;
      }

      .autocomplete-list {
        position: absolute;

        top: 100%;
        left: 0;
        right: 0;

        background: white;

        border: 1px solid #ddd;

        border-radius: 12px;

        overflow-y: auto;

        max-height: 250px;

        z-index: 9999;

        display: none;

        -webkit-overflow-scrolling: touch;
      }

      .autocomplete-item {
        padding: 14px;
        cursor: pointer;

        border-bottom: 1px solid #eee;

        user-select: none;
      }

      .autocomplete-item:hover {
        background: #f5f5f5;
      }

      .autocomplete-title {
        font-weight: 700;
      }

      .autocomplete-subtitle {
        font-size: 13px;

        color: #666;

        margin-top: 4px;
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <h2>🛒 Finalizar Pedido</h2>
    </header>

    <section class="menu">
      <div class="checkout-container">
        <!-- RESUMO -->

        <div class="bloco resumo-card">
          <h3>Resumo do Carrinho</h3>

          <div id="resumo"></div>

          <div class="resumo-box">
            <p>
              Subtotal:
              <strong> R$ <span id="subtotal">0.00</span> </strong>
            </p>

            <p id="linhaTaxa">
              Taxa de entrega:
              <strong> R$ <span id="taxaEntrega">0.00</span> </strong>
            </p>

            <p class="linha-total">
              Total:
              <strong> R$ <span id="total">0.00</span> </strong>
            </p>
          </div>
        </div>

        <!-- FORMULÁRIO -->

        <div class="bloco dados-card">
          <h3>Seus dados</h3>

          <form id="checkoutForm" class="checkout-form">
            <div class="campo">
              <label for="cliente">Nome</label>
              <input
                type="text"
                id="cliente"
                placeholder="Digite seu nome"
                required
              />
            </div>

            <div class="campo">
              <label for="telefone">Telefone</label>
              <input
                type="tel"
                id="telefone"
                placeholder="+55 (11) 99999-9999"
                maxlength="19"
                inputmode="numeric"
                required
              />
            </div>

            <div class="campo">
              <label for="tipoPedido">Tipo do pedido</label>
              <select id="tipoPedido" required>
                <option value="Delivery">Delivery</option>
                <option value="Retirada">Retirada</option>
              </select>
            </div>

            <div id="camposDelivery">
              <div class="endereco-grid">
                <div class="campo">
                  <label for="bairro">Bairro</label>
                  <input
                    type="text"
                    id="bairro"
                    placeholder="Digite seu bairro"
                    required
                  />
                </div>

                <div class="campo full">
                  <label for="cep">CEP</label>

                  <input
                    type="tel"
                    id="cep"
                    placeholder="00000-000"
                    maxlength="9"
                    inputmode="numeric"
                  />
                </div>

                <div class="campo full">
                  <label for="endereco">Rua e número</label>

                  <div class="autocomplete-wrapper">
                    <input id="rua" class="form-control" placeholder="Rua" />

                    <div id="ruaSugestoes" class="autocomplete-list"></div>
                  </div>

                  <div
                    id="listaSugestoesEndereco"
                    class="lista-sugestoes-endereco"
                  ></div>

                  <input type="text" id="numero" placeholder="Número" />

                  <div class="checkbox-rua-sem-numero">
                    <input type="checkbox" id="ruaSemNumero" />

                    <label for="ruaSemNumero"> Rua sem número (S/N) </label>
                  </div>

                  <button
                    type="button"
                    id="btnLocalizacao"
                    class="btn-localizacao"
                  >
                    📍 Usar localização atual
                  </button>

                  <small id="statusLocalizacao"></small>
                </div>

                <div class="campo full">
                  <label for="referencia"> Complemento / Referência </label>

                  <input
                    type="text"
                    id="referencia"
                    placeholder="Apartamento, bloco, casa de esquina..."
                  />
                </div>
              </div>
            </div>

            <div class="campo">
              <label for="pagamentoMetodo"> Forma de pagamento </label>

              <select id="pagamentoMetodo" required>
                <option value="">Selecione</option>
                <option value="PIX">PIX</option>
                <option value="DINHEIRO">Dinheiro</option>
                <option value="CARTAO_CREDITO">Cartão de crédito</option>
                <option value="CARTAO_DEBITO">Cartão de débito</option>
              </select>
            </div>

            <div class="campo hidden" id="campoTrocoPara">
              <label for="trocoPara"> Troco para </label>

              <input
                type="number"
                id="trocoPara"
                min="0"
                step="0.01"
                placeholder="Ex.: 50.00"
              />
            </div>

            <div class="campo full">
              <label for="observacoes"> Observações </label>

              <textarea
                id="observacoes"
                placeholder="Ex.: tocar interfone..."
              ></textarea>
            </div>

            <button type="submit" id="btnFinalizar" class="btn-finalizar">
              Confirmar Pedido
            </button>
          </form>
        </div>
      </div>
    </section>

    <script type="module">
      import { criarPedido } from "./js/services/orders.js";
      import { listarTaxasEntregaAtivas } from "./js/services/delivery-fees.js";
      import { buscarConfiguracoes } from "./js/services/config.js";

      import {
        buscarEnderecos,
        buscarDetalhesEndereco,
      } from "./js/services/address-search.js";

      import {
        garantirClienteAuth,
        buscarCliente,
        salvarCliente,
      } from "./js/services/customers.js";

      const config = await buscarConfiguracoes();

      console.log("CONFIG CHECKOUT:", config);

      const carrinho = (() => {
        try {
          return JSON.parse(localStorage.getItem("mesaFacilCarrinho")) || [];
        } catch {
          return [];
        }
      })();

      const resumo = document.getElementById("resumo");
      const subtotalEl = document.getElementById("subtotal");
      const taxaEntregaEl = document.getElementById("taxaEntrega");
      const totalEl = document.getElementById("total");
      const linhaTaxa = document.getElementById("linhaTaxa");

      const form = document.getElementById("checkoutForm");
      const tipoPedidoEl = document.getElementById("tipoPedido");

      const clienteEl = document.getElementById("cliente");
      const telefoneEl = document.getElementById("telefone");
      telefoneEl.addEventListener("input", () => {
        telefoneEl.value = formatarTelefone(telefoneEl.value);
      });

      const camposDelivery = document.getElementById("camposDelivery");
      const bairroEl = document.getElementById("bairro");
      bairroEl.addEventListener("input", () => {
        bairroDetectado = null;

        taxaEntrega = 0;

        recalcularTotal();
      });
      const ruaEl = document.getElementById("rua");
      const numeroEl = document.getElementById("numero");
      const ruaSugestoesEl = document.getElementById("ruaSugestoes");

      let timeoutRua = null;
      let configuracoesLoja = null;
      const ruaSemNumeroEl = document.getElementById("ruaSemNumero");
      const cepEl = document.getElementById("cep");
      cepEl.addEventListener("input", () => {
        let valor = cepEl.value.replace(/\D/g, "");

        valor = valor.substring(0, 8);

        if (valor.length > 5) {
          valor = valor.substring(0, 5) + "-" + valor.substring(5);
        }

        cepEl.value = valor;
      });
      cepEl.addEventListener("blur", () => {
        if (cepEl.value.length === 9) {
          buscarCEP(cepEl.value);
        }
      });
      const referenciaEl = document.getElementById("referencia");
      const observacoesEl = document.getElementById("observacoes");

      const btnLocalizacaoEl = document.getElementById("btnLocalizacao");
      const statusLocalizacaoEl = document.getElementById("statusLocalizacao");

      let latitudeCliente = null;
      let longitudeCliente = null;

      const pagamentoMetodoEl = document.getElementById("pagamentoMetodo");
      const campoTrocoParaEl = document.getElementById("campoTrocoPara");
      const trocoParaEl = document.getElementById("trocoPara");
      const valorTrocoEl = document.createElement("small");

      valorTrocoEl.id = "valorTroco";
      valorTrocoEl.style.display = "block";
      valorTrocoEl.style.marginTop = "8px";
      valorTrocoEl.style.fontWeight = "700";

      campoTrocoParaEl.appendChild(valorTrocoEl);

      function atualizarTroco() {
        const valorEntregue = Number(trocoParaEl.value || valorTotal);

        const troco = Math.max(valorEntregue - valorTotal, 0);

        valorTrocoEl.innerText = `Troco: R$ ${troco.toFixed(2)}`;
      }

      trocoParaEl.addEventListener("input", atualizarTroco);

      let valorSubtotal = 0;
      let taxaEntrega = 0;
      let valorTotal = 0;
      let bairrosEntrega = [];

      let entregaDisponivel = true;

      let bairroDetectado = null;

      function normalizarTelefone(telefone) {
        let numero = String(telefone || "").replace(/\D/g, "");

        numero = numero.replace(/^0+/, "");

        if (numero.length === 8 || numero.length === 9) {
          numero = `19${numero}`;
        }

        if (numero.length === 10 || numero.length === 11) {
          numero = `55${numero}`;
        }

        if (
          (numero.length === 12 || numero.length === 13) &&
          !numero.startsWith("55")
        ) {
          numero = `55${numero}`;
        }

        return numero;
      }

      function telefoneEhValido(numeroNormalizado) {
        return /^55\d{10,11}$/.test(numeroNormalizado);
      }

      function formatarTelefone(numero) {
        let valor = String(numero || "").replace(/\D/g, "");

        // remove código 55 caso já exista
        if (valor.startsWith("55")) {
          valor = valor.substring(2);
        }

        // limita para celular brasileiro:
        // DDD (2) + número (9) = 11 dígitos
        valor = valor.substring(0, 11);

        if (valor.length <= 2) {
          return `+55 (${valor}`;
        }

        if (valor.length <= 7) {
          return `+55 (${valor.substring(0, 2)}) ${valor.substring(2)}`;
        }

        if (valor.length <= 11) {
          return `+55 (${valor.substring(0, 2)}) ${valor.substring(2, 7)}-${valor.substring(7)}`;
        }

        return valor;
      }

      function fecharSugestoesRua() {
        if (!ruaSugestoesEl) return;

        ruaSugestoesEl.innerHTML = "";
        ruaSugestoesEl.style.display = "none";
      }

      function renderizarSugestoesRua(resultados) {
        if (!ruaSugestoesEl) return;

        ruaSugestoesEl.innerHTML = "";

        if (!resultados.length) {
          ruaSugestoesEl.style.display = "none";
          return;
        }

        resultados.forEach((item) => {
          const div = document.createElement("div");

          div.className = "autocomplete-item";

          div.innerHTML = `
      <div class="autocomplete-title">
        📍 ${item.rua}
      </div>

      <div class="autocomplete-subtitle">
        ${item.cidade} - ${item.estado}
      </div>
    `;

          div.addEventListener("click", async () => {
            ruaEl.value = item.rua || "";

            const lat = item.latitude ?? item.lat;
            const lon = item.longitude ?? item.lon;

            if (lat && lon) {
              latitudeCliente = Number(lat);
              longitudeCliente = Number(lon);

              console.log("Coordenadas rua selecionada:", {
                latitudeCliente,
                longitudeCliente,
              });
            }

            numeroEl.value = "";

            try {
              const detalhes = await buscarDetalhesEndereco(
                item.latitude,
                item.longitude,
              );

              console.log("Detalhes endereço:", detalhes);

              // preenche somente bairro
              bairroEl.value = detalhes.bairro || item.bairro || "";

              // mantém CEP manual
              cepEl.value = "";

              // tenta encontrar a taxa do bairro automaticamente
              const bairroEncontrado = bairrosEntrega.find(
                (bairro) =>
                  normalizarTexto(bairro.nome) ===
                  normalizarTexto(bairroEl.value),
              );

              if (bairroEncontrado) {
                bairroDetectado = bairroEncontrado;

                liberarEntrega();

                recalcularTotal();
              }
            } catch (erro) {
              console.error("Erro detalhes endereço:", erro);
            }

            fecharSugestoesRua();

            numeroEl.focus();
          });

          ruaSugestoesEl.appendChild(div);
        });

        ruaSugestoesEl.style.display = "block";
      }

      function formatarMoeda(valor) {
        return Number(valor || 0).toLocaleString("pt-BR", {
          style: "currency",
          currency: "BRL",
        });
      }

      function bloquearEntrega(mensagem) {
        entregaDisponivel = false;

        bairroDetectado = null;

        bairroEl.value = "";
        ruaEl.value = "";
        numeroEl.value = "";

        taxaEntrega = 0;

        recalcularTotal();

        document.getElementById("btnFinalizar").disabled = true;

        alert(mensagem);
      }

      function buscarBairroDigitado() {
        const texto = normalizarTexto(bairroEl.value);

        if (!texto) {
          bairroDetectado = null;
          recalcularTotal();
          return;
        }

        const encontrados = bairrosEntrega.filter((bairro) => {
          const nome = normalizarTexto(bairro.nome);

          return nome === texto || nome.includes(texto) || texto.includes(nome);
        });

        if (encontrados.length === 1) {
          bairroDetectado = encontrados[0];

          bairroEl.value = encontrados[0].nome;

          liberarEntrega();

          recalcularTotal();

          return;
        }

        if (encontrados.length > 1) {
          const escolha = window.prompt(
            `Encontramos bairros parecidos:\n\n` +
              encontrados
                .map((bairro, index) => `${index + 1}. ${bairro.nome}`)
                .join("\n") +
              `\n\nDigite o número do bairro:`,
          );

          const indice = Number(escolha);

          if (!Number.isNaN(indice) && encontrados[indice - 1]) {
            bairroDetectado = encontrados[indice - 1];

            bairroEl.value = encontrados[indice - 1].nome;

            liberarEntrega();
          }
        } else {
          bairroDetectado = null;
        }

        recalcularTotal();
      }

      function liberarEntrega() {
        entregaDisponivel = true;

        document.getElementById("btnFinalizar").disabled = false;
      }

      function renderCarrinho() {
        resumo.innerHTML = "";
        valorSubtotal = 0;

        if (!Array.isArray(carrinho) || carrinho.length === 0) {

      function normalizarTexto(texto) {
        return String(texto || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .trim();
      }

      function calcularDistancia(lat1, lon1, lat2, lon2) {
        if (lat1 == null || lon1 == null || lat2 == null || lon2 == null) {
          return null;
        }

        const R = 6371; // raio da Terra em km

        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLon = ((lon2 - lon1) * Math.PI) / 180;

        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos((lat1 * Math.PI) / 180) *
            Math.cos((lat2 * Math.PI) / 180) *
            Math.sin(dLon / 2) ** 2;

        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return R * c;
      }

      function calcularTaxaPorDistancia(distanciaKm) {
        if (distanciaKm == null) return 0;

        if (distanciaKm <= 1.9) {
          return 9;
        }

        if (distanciaKm <= 3.1) {
          return 10;
        }

        if (distanciaKm <= 4.9) {
          return 11;
        }

        if (distanciaKm <= 5.1) {
          return 12;
        }

        if (distanciaKm <= 5.3) {
          return 13;
        }

        if (distanciaKm <= 6.0) {
          return 14;
        }

        if (distanciaKm <= 6.1) {
          return 15;
        }

        if (distanciaKm <= 6.2) {
          return 16;
        }

        if (distanciaKm <= 7.0) {
          return 17;
        }

        // acima de 7 km
        return null;
      }

      function encontrarBairro(nomeBairroAPI) {
        if (!nomeBairroAPI) return null;

        const busca = normalizarTexto(nomeBairroAPI);

        const semelhantes = bairrosEntrega.filter((bairro) => {
          const nome = normalizarTexto(bairro.nome);

          return nome === busca || nome.includes(busca) || busca.includes(nome);
        });

        if (semelhantes.length > 1) {
          const nomes = semelhantes.map((b) => b.nome);

          const escolha = window.prompt(
            `Encontramos mais de um bairro:\n\n${nomes
              .map((nome, i) => `${i + 1}. ${nome}`)
              .join("\n")}\n\nDigite o número da opção:`,
          );

          if (!escolha) return null;

          const indice = Number(escolha);

          if (
            Number.isNaN(indice) ||
            indice < 1 ||
            indice > semelhantes.length
          ) {
            alert("Opção inválida.");
            return null;
          }

          return semelhantes[indice - 1];
        }

        // correspondência exata
        let encontrados = bairrosEntrega.filter(
          (b) => normalizarTexto(b.nome) === busca,
        );

        if (encontrados.length === 1) {
          return encontrados[0];
        }

        // contém o texto
        encontrados = bairrosEntrega.filter((b) =>
          normalizarTexto(b.nome).includes(busca),
        );

        if (encontrados.length === 1) {
          return encontrados[0];
        }

        // texto contém o nome do banco
        encontrados = bairrosEntrega.filter((b) =>
          busca.includes(normalizarTexto(b.nome)),
        );

        if (encontrados.length === 1) {
          return encontrados[0];
        }

        // mais de um bairro encontrado (ex.: Porto Alegre)
        if (encontrados.length > 1) {
          const nomes = encontrados.map((b) => b.nome);

          const escolhido = window.prompt(
            `Encontramos mais de um bairro:\n\n${nomes
              .map((nome, i) => `${i + 1}. ${nome}`)
              .join("\n")}\n\nDigite exatamente o nome do seu bairro:`,
          );

          if (!escolhido) return null;

          return (
            encontrados.find(
              (b) => normalizarTexto(b.nome) === normalizarTexto(escolhido),
            ) || null
          );
        }

        return null;
      }

      async function buscarEnderecoPorCoordenadas(lat, lon) {
        const url =
          `https://nominatim.openstreetmap.org/reverse?` +
          `format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;

        const resposta = await fetch(url, {
          headers: {
            Accept: "application/json",
          },
        });

        if (!resposta.ok) {
          throw new Error("Erro na geocodificação");
        }

        return await resposta.json();
      }

      async function buscarCoordenadasEndereco(
        rua,
        bairro,
        cidade,
        estado,
        cep,
      ) {
        try {
          const consultas = [
            `${cep}, Brasil`,
            `${rua}, ${cidade}, ${estado}, Brasil`,
            `${rua}, ${bairro}, ${cidade}, ${estado}, Brasil`,
          ];

          for (const consulta of consultas) {
            const endereco = encodeURIComponent(consulta);

            const resposta = await fetch(
              `https://nominatim.openstreetmap.org/search?` +
                `format=json&q=${endereco}&limit=1`,
            );

            const dados = await resposta.json();

            if (dados.length) {
              latitudeCliente = Number(dados[0].lat);
              longitudeCliente = Number(dados[0].lon);

              console.log("Coordenadas encontradas:", {
                consulta,
                latitudeCliente,
                longitudeCliente,
              });

              return;
            }
          }

          console.warn("Não foi possível encontrar coordenadas do endereço");
        } catch (erro) {
          console.error("Erro ao buscar coordenadas:", erro);
        }
      }

      async function buscarCEP(cep) {
        bairroDetectado = null;

        latitudeCliente = null;
        longitudeCliente = null;

        const numeroCEP = cep.replace(/\D/g, "");

        if (numeroCEP.length !== 8) {
          return;
        }

        const resposta = await fetch(
          `https://viacep.com.br/ws/${numeroCEP}/json/`,
        );

        const dados = await resposta.json();

        if (dados.erro) {
          alert("CEP não encontrado.");
          return;
        }

        ruaEl.value = dados.logradouro || "";

        await buscarCoordenadasEndereco(
          dados.logradouro,
          dados.bairro,
          dados.localidade,
          dados.uf,
          numeroCEP,
        );

        const nomeBairroCEP = normalizarTexto(dados.bairro);

        const bairroEncontrado = bairrosEntrega.find((bairro) => {
          const nomeBanco = normalizarTexto(bairro.nome);

          return (
            nomeBanco === nomeBairroCEP ||
            nomeBanco.includes(nomeBairroCEP) ||
            nomeBairroCEP.includes(nomeBanco)
          );
        });

        if (bairroEncontrado) {
          // CEP tem prioridade: substitui o que o cliente digitou
          bairroEl.value = bairroEncontrado.nome;

          bairroDetectado = bairroEncontrado;

          liberarEntrega();
        } else {
          // CEP encontrado, mas bairro não existe nas taxas
          bairroDetectado = null;

          console.log(
            "Bairro encontrado no CEP, mas não cadastrado:",
            dados.bairro,
          );
        }

        recalcularTotal();
      }

          alert("Pedido enviado com sucesso!");
          localStorage.removeItem("mesaFacilCarrinho");

          window.location.href = `./status.html?id=${docRef.id}`;
        } catch (erro) {
          console.error("Erro ao finalizar pedido:", erro);
          alert("Não foi possível finalizar o pedido.");
        }
      }

      async function init() {
        try {
          await garantirClienteAuth();

          configuracoesLoja = await buscarConfiguracoes();

          aplicarPagamentos();
          aplicarConfiguracoesLoja();

          console.log("Configurações da loja:", configuracoesLoja);

          document.title = `${configuracoesLoja?.loja?.nome || "Mesa Fácil"} - Pedido`;

          // 1) recuperar tipo escolhido no index
          const tipoSalvo = localStorage.getItem("tipoPedido");
          if (tipoSalvo === "Delivery" || tipoSalvo === "Retirada") {
            tipoPedidoEl.value = tipoSalvo;
          }

          // 2) carregar cliente sem quebrar se não existir
          const cliente = await buscarCliente();

          if (cliente) {
            clienteEl.value = cliente.nome || "";

            telefoneEl.value = cliente.telefone || "";

            ruaEl.value = cliente.endereco?.rua || "";

            cepEl.value = cliente.endereco?.cep || "";

            numeroEl.value = cliente.endereco?.numero || "";

            referenciaEl.value = cliente.endereco?.complemento || "";
          }

          // 3) renderizar carrinho
          renderCarrinho();

          // 4) carregar bairros antes de recalcular total
          await carregarBairros();

          ruaEl.addEventListener("input", () => {
            clearTimeout(timeoutRua);

            timeoutRua = setTimeout(pesquisarRuaCheckout, 300);
          });

          bairroEl.addEventListener("blur", () => {
            buscarBairroDigitado();
          });

          if (cliente) {
            selecionarBairroCliente(cliente);
          }

          function selecionarBairroCliente(cliente) {
            const nomeBairro = cliente?.endereco?.bairro || "";

            if (!nomeBairro) return;

            const bairroEncontrado = bairrosEntrega.find(
              (bairro) =>
                normalizarTexto(bairro.nome) === normalizarTexto(nomeBairro),
            );

            if (bairroEncontrado) {
              // CEP tem prioridade: substitui o bairro digitado
              bairroEl.value = bairroEncontrado.nome;

              bairroDetectado = bairroEncontrado;

              liberarEntrega();

              recalcularTotal();
            }
          }

          // 5) agora sim ajustar interface do tipo de pedido
          atualizarCamposTipoPedido();
          atualizarCampoTroco();

          // eventos
          tipoPedidoEl.addEventListener("change", () => {
            localStorage.setItem("tipoPedido", tipoPedidoEl.value);
            atualizarCamposTipoPedido();
          });

          ruaSemNumeroEl.addEventListener("change", () => {
            if (ruaSemNumeroEl.checked) {
              numeroEl.value = "S/N";
              numeroEl.disabled = true;
              referenciaEl.required = true;
            } else {
              numeroEl.value = "";
              numeroEl.disabled = false;
              referenciaEl.required = false;
            }
          });

          pagamentoMetodoEl.addEventListener("change", atualizarCampoTroco);

          btnLocalizacaoEl.addEventListener("click", () => {
            console.log("Botão localização clicado");

            usarLocalizacaoAtual();
          });

          // FECHAR AUTOCOMPLETE AO CLICAR FORA
          document.addEventListener("pointerdown", (event) => {
            if (
              !event.target.closest("#rua") &&
              !event.target.closest("#ruaSugestoes")
            ) {
              fecharSugestoesRua();
            }
          });

          form.addEventListener("submit", finalizarPedido);
        } catch (erro) {
          console.error("Erro ao iniciar checkout:", erro);
        }
      }

      init();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
      eruda.init();
    </script>
  </body>
</html>
