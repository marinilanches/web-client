<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Pedido</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/pedido-status.css" />
    <style>
      /* ==========================================================
   CHECKOUT
========================================================== */

      .checkout-container {
        max-width: 900px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .checkout-form {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .bloco {
        background: #fff;
        border: 1px solid var(--mf-border);
        border-radius: 20px;
        padding: 22px;
        box-shadow: var(--mf-shadow-sm);
      }

      .bloco h2,
      .bloco h3 {
        font-size: 1.15rem;
        font-weight: 800;
        margin-bottom: 18px;
        color: var(--mf-text);
      }

      .campo {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 18px;
      }

      .campo:last-child {
        margin-bottom: 0;
      }

      .campo label {
        font-weight: 700;
        color: var(--mf-text);
      }

      .checkout-form input,
      .checkout-form textarea,
      .checkout-form select {
        width: 100%;

        min-height: 52px;

        border: 1px solid var(--mf-border);

        border-radius: 14px;

        padding: 14px 16px;

        font-size: 15px;

        background: #fff;

        transition: 0.2s;
      }

      .checkout-form textarea {
        min-height: 110px;

        resize: vertical;
      }

      .checkout-form input:focus,
      .checkout-form textarea:focus,
      .checkout-form select:focus {
        border-color: var(--mf-primary);

        box-shadow: 0 0 0 4px rgba(234, 29, 44, 0.1);

        outline: none;
      }

      .hidden {
        display: none !important;
      }

      /* ==========================================================
   RESUMO
========================================================== */

      .item-resumo {
        display: flex;

        justify-content: space-between;

        align-items: flex-start;

        gap: 16px;

        padding: 14px 0;

        border-bottom: 1px solid #ececec;
      }

      .item-resumo:last-child {
        border-bottom: none;
      }

      .item-resumo strong {
        font-size: 15px;
      }

      .item-resumo small {
        color: #777;
      }

      .resumo-box {
        border: 1px solid var(--mf-border);

        border-radius: 16px;

        padding: 18px;

        background: #fafafa;
      }

      .resumo-box p {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin: 12px 0;

        font-size: 15px;
      }

      .linha-total {
        display: flex;

        justify-content: space-between;

        align-items: center;

        margin-top: 20px;

        padding-top: 18px;

        border-top: 2px dashed #ddd;

        font-size: 18px;

        font-weight: 800;
      }

      .linha-total strong {
        color: var(--mf-primary);

        font-size: 1.6rem;
      }

      /* ==========================================================
   BOTÕES
========================================================== */

      .btn {
        border-radius: 14px;

        font-weight: 700;

        transition: 0.2s;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-finalizar {
        width: 100%;

        min-height: 60px;

        border: none;

        border-radius: 16px;

        background: linear-gradient(135deg, #ff3344, var(--mf-primary));

        color: #fff;

        font-size: 18px;

        font-weight: 800;

        box-shadow: 0 18px 40px rgba(234, 29, 44, 0.25);
      }

      .btn-finalizar:hover {
        filter: brightness(1.03);
      }

      .btn-finalizar:disabled {
        opacity: 0.55;

        cursor: not-allowed;
      }

      /* ==========================================================
   BLOCOS DE ENDEREÇO
========================================================== */

      .endereco-grid {
        display: grid;

        grid-template-columns: repeat(2, minmax(0, 1fr));

        gap: 16px;
      }

      .endereco-grid .campo.full {
        grid-column: 1/-1;
      }

      /* ==========================================================
   MOBILE
========================================================== */

      @media (max-width: 768px) {
        .checkout-container {
          margin: 12px auto;

          padding: 0 12px 110px;
        }

        .bloco {
          padding: 18px;

          border-radius: 18px;
        }

        .endereco-grid {
          grid-template-columns: 1fr;

          gap: 12px;
        }

        .linha-total {
          font-size: 16px;
        }

        .linha-total strong {
          font-size: 1.4rem;
        }

        .btn-finalizar {
          position: fixed;

          left: 12px;

          right: 12px;

          bottom: calc(12px + env(safe-area-inset-bottom));

          z-index: 1050;

          min-height: 58px;
        }
      }

      @media (max-width: 480px) {
        .bloco {
          padding: 16px;
        }

        .campo label {
          font-size: 0.95rem;
        }

        .checkout-form input,
        .checkout-form textarea,
        .checkout-form select {
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <h2>🛒 Finalizar Pedido</h2>
    </header>

    <section class="menu">
      <div class="checkout-container">
        <!-- RESUMO -->

        <div class="bloco resumo-card">
          <h3>Resumo do Carrinho</h3>

          <div id="resumo"></div>

          <div class="resumo-box">
            <p>
              Subtotal:
              <strong> R$ <span id="subtotal">0.00</span> </strong>
            </p>

            <p id="linhaTaxa">
              Taxa de entrega:
              <strong> R$ <span id="taxaEntrega">0.00</span> </strong>
            </p>

            <p class="linha-total">
              Total:
              <strong> R$ <span id="total">0.00</span> </strong>
            </p>
          </div>
        </div>

        <!-- FORMULÁRIO -->

        <div class="bloco dados-card">
          <h3>Seus dados</h3>

          <form id="checkoutForm" class="checkout-form">
            <div class="campo">
              <label for="cliente">Nome</label>
              <input
                type="text"
                id="cliente"
                placeholder="Digite seu nome"
                required
              />
            </div>

            <div class="campo">
              <label for="telefone">Telefone</label>
              <input
                type="tel"
                id="telefone"
                placeholder="(11) 99999-9999"
                required
              />
            </div>

            <div class="campo">
              <label for="tipoPedido">Tipo do pedido</label>
              <select id="tipoPedido" required>
                <option value="Delivery">Delivery</option>
                <option value="Retirada">Retirada</option>
              </select>
            </div>

            <div id="camposDelivery">
              <div class="endereco-grid">
                <div class="campo">
                  <label for="bairro">Bairro</label>
                  <select id="bairro" required>
                    <option value="">Selecione o bairro</option>
                  </select>
                </div>

                <div class="campo full">
                  <label for="endereco">Rua e número</label>

                  <input type="text" id="rua" placeholder="Rua" required />

                  <div
                    id="listaSugestoesEndereco"
                    class="lista-sugestoes-endereco"
                  ></div>

                  <input
                    type="text"
                    id="numero"
                    placeholder="Número"
                    required
                  />

                  <button
                    type="button"
                    id="btnLocalizacao"
                    class="btn-localizacao"
                  >
                    📍 Usar localização atual
                  </button>

                  <small id="statusLocalizacao"></small>
                </div>

                <div class="campo full">
                  <label for="referencia"> Complemento / Referência </label>

                  <input
                    type="text"
                    id="referencia"
                    placeholder="Apartamento, bloco, casa de esquina..."
                  />
                </div>
              </div>
            </div>

            <div class="campo">
              <label for="pagamentoMetodo"> Forma de pagamento </label>

              <select id="pagamentoMetodo" required>
                <option value="">Selecione</option>
                <option value="PIX">PIX</option>
                <option value="DINHEIRO">Dinheiro</option>
                <option value="CARTAO_CREDITO">Cartão de crédito</option>
                <option value="CARTAO_DEBITO">Cartão de débito</option>
              </select>
            </div>

            <div class="campo hidden" id="campoTrocoPara">
              <label for="trocoPara"> Troco para </label>

              <input
                type="number"
                id="trocoPara"
                min="0"
                step="0.01"
                placeholder="Ex.: 50.00"
              />
            </div>

            <div class="campo full">
              <label for="observacoes"> Observações </label>

              <textarea
                id="observacoes"
                placeholder="Ex.: sem cebola, tocar interfone..."
              ></textarea>
            </div>

            <button type="submit" id="btnFinalizar" class="btn-finalizar">
              Confirmar Pedido
            </button>
          </form>
        </div>
      </div>
    </section>

    <script type="module">
      import { criarPedido } from "./js/services/orders.js";
      import { listarTaxasEntregaAtivas } from "./js/services/delivery-fees.js";

      import {
        garantirClienteAuth,
        buscarCliente,
        salvarCliente,
      } from "./js/services/customers.js";

      const carrinho = (() => {
        try {
          return JSON.parse(localStorage.getItem("mesaFacilCarrinho")) || [];
        } catch {
          return [];
        }
      })();

      const resumo = document.getElementById("resumo");
      const subtotalEl = document.getElementById("subtotal");
      const taxaEntregaEl = document.getElementById("taxaEntrega");
      const totalEl = document.getElementById("total");
      const linhaTaxa = document.getElementById("linhaTaxa");

      const form = document.getElementById("checkoutForm");
      const tipoPedidoEl = document.getElementById("tipoPedido");

      const clienteEl = document.getElementById("cliente");
      const telefoneEl = document.getElementById("telefone");

      const camposDelivery = document.getElementById("camposDelivery");
      const bairroEl = document.getElementById("bairro");
      const ruaEl = document.getElementById("rua");
      const numeroEl = document.getElementById("numero");
      const referenciaEl = document.getElementById("referencia");
      const observacoesEl = document.getElementById("observacoes");

      const btnLocalizacaoEl = document.getElementById("btnLocalizacao");
      const statusLocalizacaoEl = document.getElementById("statusLocalizacao");

      let latitudeCliente = null;
      let longitudeCliente = null;

      const pagamentoMetodoEl = document.getElementById("pagamentoMetodo");
      const campoTrocoParaEl = document.getElementById("campoTrocoPara");
      const trocoParaEl = document.getElementById("trocoPara");

      let valorSubtotal = 0;
      let taxaEntrega = 0;
      let valorTotal = 0;
      let bairrosEntrega = [];

      let entregaDisponivel = true;

      let bairroDetectado = null;

      function normalizarTelefone(telefone) {
        let numero = String(telefone || "").replace(/\D/g, "");

        numero = numero.replace(/^0+/, "");

        if (numero.length === 8 || numero.length === 9) {
          numero = `19${numero}`;
        }

        if (numero.length === 10 || numero.length === 11) {
          numero = `55${numero}`;
        }

        if (
          (numero.length === 12 || numero.length === 13) &&
          !numero.startsWith("55")
        ) {
          numero = `55${numero}`;
        }

        return numero;
      }

      function telefoneEhValido(numeroNormalizado) {
        return /^55\d{10,11}$/.test(numeroNormalizado);
      }

      function formatarTelefone(numeroNormalizado) {
        let numero = String(numeroNormalizado || "").replace(/\D/g, "");

        if (numero.startsWith("55")) {
          numero = numero.slice(2);
        }

        if (numero.length === 11) {
          return `(${numero.slice(0, 2)}) ${numero.slice(2, 7)}-${numero.slice(7)}`;
        }

        if (numero.length === 10) {
          return `(${numero.slice(0, 2)}) ${numero.slice(2, 6)}-${numero.slice(6)}`;
        }

        return numero;
      }

      function formatarMoeda(valor) {
        return Number(valor || 0).toLocaleString("pt-BR", {
          style: "currency",
          currency: "BRL",
        });
      }

      function bloquearEntrega(mensagem) {
        entregaDisponivel = false;

        bairroDetectado = null;

        bairroEl.value = "";
        ruaEl.value = "";
        numeroEl.value = "";

        taxaEntrega = 0;

        recalcularTotal();

        document.getElementById("btnFinalizar").disabled = true;

        alert(mensagem);
      }

      function liberarEntrega() {
        entregaDisponivel = true;

        document.getElementById("btnFinalizar").disabled = false;
      }

      function renderCarrinho() {
        resumo.innerHTML = "";
        valorSubtotal = 0;

        if (!Array.isArray(carrinho) || carrinho.length === 0) {
          resumo.innerHTML = `<p>Seu carrinho está vazio.</p>`;
          taxaEntrega = 0;
          valorTotal = 0;
          subtotalEl.innerText = "0.00";
          taxaEntregaEl.innerText = "0.00";
          totalEl.innerText = "0.00";
          return;
        }

        carrinho.forEach((item) => {
          const quantidade = Number(item.quantidade || 1);

          const valorBase = Number(
            item.precoBase ?? item.preco ?? item.valor ?? 0,
          );

          const adicionais = item.personalizados?.adicionais || [];

          const valorAdicionais = adicionais.reduce(
            (total, adicional) => total + Number(adicional.preco || 0),
            0,
          );

          const valorUnitario = valorBase + valorAdicionais;

          const subtotalItem = quantidade * valorUnitario;

          // IMPORTANTE
          valorSubtotal += subtotalItem;

          const adicionaisHtml = adicionais.length
            ? `
              <div style="margin-top:6px;">
                <strong>Adicionais:</strong>
                <ul style="margin:4px 0 0 18px;padding:0;">
                  ${adicionais
                    .map(
                      (adicional) => `
                    <li>
                      ${adicional.nome}
                      (+ ${formatarMoeda(adicional.preco)})
                    </li>
                  `,
                    )
                    .join("")}
                </ul>
              </div>
            `
            : "";

          resumo.innerHTML += `
            <div class="item-resumo">

              <h4>${item.nome}</h4>

              <p>Quantidade: ${quantidade}</p>

              <p>Preço: ${formatarMoeda(valorBase)}</p>

              ${adicionaisHtml}

              <p>
                Subtotal:
                ${formatarMoeda(subtotalItem)}
              </p>

            </div>
          `;
        });

        recalcularTotal();
      }

      async function carregarBairros() {
        try {
          bairrosEntrega = await listarTaxasEntregaAtivas();

          bairroEl.innerHTML = `
            <option value="">Selecione o bairro</option>
          `;

          bairrosEntrega.forEach((bairro) => {
            const option = document.createElement("option");

            option.value = bairro.id;

            option.textContent = `${bairro.nome} — ${formatarMoeda(bairro.taxa)}`;

            bairroEl.appendChild(option);
          });

          recalcularTotal();
        } catch (erro) {
          console.error("Erro ao carregar bairros:", erro);

          bairroEl.innerHTML = `
            <option value="">Erro ao carregar bairros</option>
          `;
        }
      }

      function obterBairroSelecionado() {
        if (bairroDetectado) {
          return bairroDetectado;
        }

        return (
          bairrosEntrega.find((item) => item.id === bairroEl.value) || null
        );
      }

      function recalcularTotal() {
        const tipo = tipoPedidoEl.value;
        const bairroSelecionado = obterBairroSelecionado();

        if (tipo === "Delivery") {
          taxaEntrega = Number(bairroSelecionado?.taxa || 0);
          linhaTaxa.style.display = "block";
        } else {
          taxaEntrega = 0;
          linhaTaxa.style.display = "none";
        }

        valorTotal = valorSubtotal + taxaEntrega;

        subtotalEl.innerText = valorSubtotal.toFixed(2);
        taxaEntregaEl.innerText = taxaEntrega.toFixed(2);
        totalEl.innerText = valorTotal.toFixed(2);
      }

      function atualizarCamposTipoPedido() {
        const tipo = tipoPedidoEl.value;

        if (tipo === "Delivery") {
          camposDelivery.classList.remove("hidden");

          bairroEl.required = true;
          ruaEl.required = true;
          numeroEl.required = true;
        } else {
          bairroDetectado = null;

          camposDelivery.classList.add("hidden");

          bairroEl.required = false;
          ruaEl.required = false;
          numeroEl.required = false;

          bairroEl.value = "";
          ruaEl.value = "";
          numeroEl.value = "";
          referenciaEl.value = "";

          liberarEntrega();
        }

        recalcularTotal();
      }

      function atualizarCampoTroco() {
        const metodo = pagamentoMetodoEl.value;

        if (metodo === "DINHEIRO") {
          campoTrocoParaEl.classList.remove("hidden");
        } else {
          campoTrocoParaEl.classList.add("hidden");
          trocoParaEl.value = "";
        }
      }

      function validarFormulario() {
        const cliente = clienteEl.value.trim();
        const telefone = telefoneEl.value.trim();
        const tipo = tipoPedidoEl.value;
        const rua = ruaEl.value.trim();
        const numero = numeroEl.value.trim();
        const pagamentoMetodo = pagamentoMetodoEl.value;
        const telefoneWhatsapp = normalizarTelefone(telefone);
        const bairroSelecionado = obterBairroSelecionado();

        if (tipo === "Delivery" && !entregaDisponivel) {
          alert("Ainda não entregamos neste bairro.");

          return false;
        }

        if (carrinho.length === 0) {
          alert("Carrinho vazio!");
          return false;
        }

        if (!cliente) {
          alert("Preencha seu nome.");
          clienteEl.focus();
          return false;
        }

        if (!telefone) {
          alert("Preencha seu telefone.");
          telefoneEl.focus();
          return false;
        }

        if (!telefoneEhValido(telefoneWhatsapp)) {
          alert("Telefone inválido.");
          telefoneEl.focus();
          return false;
        }

        if (tipo === "Delivery" && !bairroSelecionado) {
          alert("Selecione o bairro.");
          bairroEl.focus();
          return false;
        }

        if (tipo === "Delivery" && !rua) {
          alert("Preencha a rua.");
          ruaEl.focus();
          return false;
        }

        if (tipo === "Delivery" && !numero) {
          alert("Informe o número.");
          numeroEl.focus();
          return false;
        }

        if (!pagamentoMetodo) {
          alert("Selecione a forma de pagamento.");
          pagamentoMetodoEl.focus();
          return false;
        }

        if (pagamentoMetodo === "DINHEIRO") {
          const trocoPara = Number(trocoParaEl.value || 0);

          if (!trocoPara || trocoPara <= 0) {
            alert("Informe o valor para troco.");
            trocoParaEl.focus();
            return false;
          }

          if (trocoPara < valorTotal) {
            alert(
              "O troco para não pode ser menor que o valor total do pedido.",
            );
            trocoParaEl.focus();
            return false;
          }
        }

        return true;
      }

      // ======================================================
      // LOCALIZAÇÃO ATUAL + GEOCODIFICAÇÃO REVERSA
      // ======================================================

      function normalizarTexto(texto) {
        return String(texto || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .trim();
      }

      function encontrarBairro(nomeBairroAPI) {
        if (!nomeBairroAPI) return null;

        const busca = normalizarTexto(nomeBairroAPI);

        const semelhantes = bairrosEntrega.filter((bairro) => {
          const nome = normalizarTexto(bairro.nome);

          return nome === busca || nome.includes(busca) || busca.includes(nome);
        });

        if (semelhantes.length > 1) {
          const nomes = semelhantes.map((b) => b.nome);

          const escolha = window.prompt(
            `Encontramos mais de um bairro:\n\n${nomes
              .map((nome, i) => `${i + 1}. ${nome}`)
              .join("\n")}\n\nDigite o número da opção:`,
          );

          if (!escolha) return null;

          const indice = Number(escolha);

          if (
            Number.isNaN(indice) ||
            indice < 1 ||
            indice > semelhantes.length
          ) {
            alert("Opção inválida.");
            return null;
          }

          return semelhantes[indice - 1];
        }

        // correspondência exata
        let encontrados = bairrosEntrega.filter(
          (b) => normalizarTexto(b.nome) === busca,
        );

        if (encontrados.length === 1) {
          return encontrados[0];
        }

        // contém o texto
        encontrados = bairrosEntrega.filter((b) =>
          normalizarTexto(b.nome).includes(busca),
        );

        if (encontrados.length === 1) {
          return encontrados[0];
        }

        // texto contém o nome do banco
        encontrados = bairrosEntrega.filter((b) =>
          busca.includes(normalizarTexto(b.nome)),
        );

        if (encontrados.length === 1) {
          return encontrados[0];
        }

        // mais de um bairro encontrado (ex.: Porto Alegre)
        if (encontrados.length > 1) {
          const nomes = encontrados.map((b) => b.nome);

          const escolhido = window.prompt(
            `Encontramos mais de um bairro:\n\n${nomes
              .map((nome, i) => `${i + 1}. ${nome}`)
              .join("\n")}\n\nDigite exatamente o nome do seu bairro:`,
          );

          if (!escolhido) return null;

          return (
            encontrados.find(
              (b) => normalizarTexto(b.nome) === normalizarTexto(escolhido),
            ) || null
          );
        }

        return null;
      }

      async function buscarEnderecoPorCoordenadas(lat, lon) {
        const url =
          `https://nominatim.openstreetmap.org/reverse?` +
          `format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`;

        const resposta = await fetch(url, {
          headers: {
            Accept: "application/json",
          },
        });

        if (!resposta.ok) {
          throw new Error("Erro na geocodificação");
        }

        return await resposta.json();
      }

      async function usarLocalizacaoAtual() {
        console.log("Entrou em usarLocalizacaoAtual");

        if (!navigator.geolocation) {
          alert("Seu navegador não suporta localização.");
          return;
        }

        statusLocalizacaoEl.innerText = "Obtendo localização...";

        navigator.geolocation.getCurrentPosition(
          async (posicao) => {
            try {
              latitudeCliente = posicao.coords.latitude;

              longitudeCliente = posicao.coords.longitude;

              const dados = await buscarEnderecoPorCoordenadas(
                latitudeCliente,
                longitudeCliente,
              );

              const endereco = dados.address || {};

              const rua = endereco.road || endereco.pedestrian || "";

              const numero = endereco.house_number || "";

              if (rua) {
                ruaEl.value = rua;

                if (numero) {
                  numeroEl.value = numero;
                }
              }

              const bairroAPI =
                endereco.suburb ||
                endereco.neighbourhood ||
                endereco.city_district ||
                "";

              const bairroEncontrado = encontrarBairro(bairroAPI);

              if (bairroEncontrado) {
                bairroDetectado = bairroEncontrado;

                bairroEl.value = bairroEncontrado.id;

                liberarEntrega();

                recalcularTotal();

                statusLocalizacaoEl.innerText = "Localização encontrada!";
                setTimeout(() => {
                  statusLocalizacaoEl.innerText = "";
                }, 5000);
              } else {
                bloquearEntrega("Desculpe, ainda não entregamos neste bairro.");
              }
            } catch (erro) {
              console.error("Erro ao converter localização:", erro);

              statusLocalizacaoEl.innerText =
                "Não foi possível obter sua localização.";
            }
          },

          (erro) => {
            console.error("Erro localização:", erro);

            statusLocalizacaoEl.innerText =
              "Não foi possível obter sua localização.";
          },

          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0,
          },
        );
      }

      async function finalizarPedido(event) {
        event.preventDefault();

        if (!validarFormulario()) return;

        const clienteAuth = await garantirClienteAuth();

        const tipo = tipoPedidoEl.value;

        const telefoneWhatsapp = normalizarTelefone(telefoneEl.value.trim());

        const telefoneFormatado = formatarTelefone(telefoneWhatsapp);

        const numeroPedido = Date.now().toString().slice(-6);

        const bairroSelecionado = obterBairroSelecionado();

        await salvarCliente({
          nome: clienteEl.value.trim(),

          telefone: telefoneFormatado,

          endereco:
            tipo === "Delivery"
              ? {
                  rua: ruaEl.value.trim(),
                  numero: numeroEl.value.trim(),
                  bairro: bairroSelecionado?.nome || "",
                  complemento: referenciaEl.value.trim(),
                }
              : null,
        });

        const itensPedido = carrinho.map((item) => {
          const quantidade = Number(item.quantidade || 1);
          const precoBase = Number(
            item.precoBase ?? item.preco ?? item.valor ?? 0,
          );
          const valorUnitario = Number(
            item.valorUnitario ?? item.valor ?? item.preco ?? 0,
          );

          const adicionais = item.personalizados?.adicionais || [];

          const observacaoItem = item.personalizados?.observacao || "";

          const acrescimoAdicionais = adicionais.reduce(
            (total, adicional) => total + Number(adicional.preco || 0),
            0,
          );

          return {
            produtoId: item.produtoId || item.id || null,
            nome: item.nome || "Item",

            quantidade,
            precoBase,
            valorUnitario,
            subtotal: quantidade * valorUnitario,

            adicionais: adicionais.map((adicional) => ({
              id: adicional.id,
              nome: adicional.nome,
              preco: Number(adicional.preco || 0),
            })),

            personalizados: {
              adicionais: adicionais.map((adicional) => ({
                id: adicional.id,
                nome: adicional.nome,
                preco: Number(adicional.preco || 0),
              })),
              observacao: observacaoItem,
            },

            observacaoItem,

            acrescimoAdicionais,
          };
        });

        const bairroNome =
          tipo === "Delivery" ? bairroSelecionado?.nome || "" : "";
        const bairroId =
          tipo === "Delivery" ? bairroSelecionado?.id || null : null;
        const taxaFinal =
          tipo === "Delivery" ? Number(bairroSelecionado?.taxa || 0) : 0;
        const bairroLabel =
          tipo === "Delivery" && bairroSelecionado
            ? `${bairroSelecionado.nome} (${formatarMoeda(taxaFinal)})`
            : "";

        console.log("Coordenadas antes de enviar:", {
          latitudeCliente,
          longitudeCliente,
        });

        const pedido = {
          numeroPedido,
          origem: "CLIENTE_WEB",

          cliente: clienteEl.value.trim(),
          telefone: telefoneFormatado,
          telefoneWhatsapp,

          tipo,
          status: "RECEBIDO",

          pagamentoMetodo: pagamentoMetodoEl.value,
          pagamentoStatus: "PENDENTE",
          trocoPara:
            pagamentoMetodoEl.value === "DINHEIRO"
              ? Number(trocoParaEl.value || 0)
              : null,

          bairroId,
          bairro: bairroNome,
          bairroLabel,
          taxaEntrega: taxaFinal,
          endereco: {
            rua: tipo === "Delivery" ? ruaEl.value.trim() : "",
            numero: tipo === "Delivery" ? numeroEl.value.trim() : "",
            bairro: bairroNome,
            complemento: tipo === "Delivery" ? referenciaEl.value.trim() : "",
          },

          referencia: tipo === "Delivery" ? referenciaEl.value.trim() : "",

          latitude: tipo === "Delivery" ? latitudeCliente : null,

          longitude: tipo === "Delivery" ? longitudeCliente : null,
          observacoes: observacoesEl.value.trim(),

          itens: itensPedido,

          valorSubtotal,
          valorTotal: valorSubtotal + taxaFinal,

          clienteId: clienteAuth.uid,
          mesaId: null,

          ultimoStatusNotificado: null,

          impresso: false,
          impressoEm: null,
        };

        try {
          // cliente já foi salvo antes da criação do pedido

          const docRef = await criarPedido(pedido);

          alert("Pedido enviado com sucesso!");
          localStorage.removeItem("mesaFacilCarrinho");

          window.location.href = `./status.html?id=${docRef.id}`;
        } catch (erro) {
          console.error("Erro ao finalizar pedido:", erro);
          alert("Não foi possível finalizar o pedido.");
        }
      }

      async function init() {
        try {
          await garantirClienteAuth();

          // 1) recuperar tipo escolhido no index
          const tipoSalvo = localStorage.getItem("tipoPedido");
          if (tipoSalvo === "Delivery" || tipoSalvo === "Retirada") {
            tipoPedidoEl.value = tipoSalvo;
          }

          // 2) carregar cliente sem quebrar se não existir
          const cliente = await buscarCliente();

          if (cliente) {
            clienteEl.value = cliente.nome || "";

            telefoneEl.value = cliente.telefone || "";

            ruaEl.value = cliente.endereco?.rua || "";

            numeroEl.value = cliente.endereco?.numero || "";

            referenciaEl.value = cliente.endereco?.complemento || "";
          }

          // 3) renderizar carrinho
          renderCarrinho();

          // 4) carregar bairros antes de recalcular total
          await carregarBairros();

          bairroEl.addEventListener("change", () => {
            bairroDetectado = null;
            liberarEntrega();
            recalcularTotal();
          });

          if (cliente) {
            selecionarBairroCliente(cliente);
          }

          function selecionarBairroCliente(cliente) {
            const nomeBairro = cliente?.endereco?.bairro || "";

            if (!nomeBairro) return;

            const bairroEncontrado = bairrosEntrega.find(
              (bairro) =>
                normalizarTexto(bairro.nome) === normalizarTexto(nomeBairro),
            );

            if (bairroEncontrado) {
              bairroEl.value = bairroEncontrado.id;

              recalcularTotal();
            }
          }

          // 5) agora sim ajustar interface do tipo de pedido
          atualizarCamposTipoPedido();
          atualizarCampoTroco();

          // eventos
          tipoPedidoEl.addEventListener("change", () => {
            localStorage.setItem("tipoPedido", tipoPedidoEl.value);
            atualizarCamposTipoPedido();
          });

          pagamentoMetodoEl.addEventListener("change", atualizarCampoTroco);

          btnLocalizacaoEl.addEventListener("click", () => {
            console.log("Botão localização clicado");

            usarLocalizacaoAtual();
          });

          form.addEventListener("submit", finalizarPedido);
        } catch (erro) {
          console.error("Erro ao iniciar checkout:", erro);
        }
      }

      init();
    </script>
  </body>
</html>
