<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Restaurante Digital</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

<header class="topbar">
  <h2>🍔 Restaurante Digital</h2>
  <div id="status">🟢 Aberto</div>
</header>

<section class="highlights">
  <h3>🔥 Mais pedidos</h3>
  <div id="maisPedidos"></div>
</section>

<section class="menu">
  <h3>Cardápio</h3>
  <div id="produtos"></div>
</section>

<footer class="cart">
  🛒 <span id="qtd">0</span> itens |
  R$ <span id="total">0.00</span>
  <div class="checkout-field">
    <label for="tipoPedido">Tipo do pedido</label>
    <select id="tipoPedido">
        <option value="Delivery">Delivery</option>
        <option value="Retirada">Retirada</option>
    </select>
  </div>

  <button id="finalizarBtn">Finalizar Pedido</button>
</footer>

<script type="module" src="./js/client/app.js"></script>

</body>
</html>
